name: ceiba_fund_manager
description: "Investment fund manager app for FPV and FIC Colombian funds."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_web_plugins:
    sdk: flutter
  get_it: ^9.2.1
  go_router: ^17.2.0
  uuid: ^4.5.3

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

